name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      # Real Postgres 16 for the integration suites; the test harness
      # (@mesomed/db/testing) creates an isolated database per test file on
      # this server when TEST_DATABASE_URL is set.
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Phase 10 Slice 2 (ADR-0025), policy D4: block on high+ severity in
      # production dependencies; lower severities and dev-deps are printed
      # by the same command but do not fail it.
      - name: Dependency audit (prod deps, fail on high+)
        run: pnpm audit --prod --audit-level high

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  secrets:
    # Phase 10 Slice 2 (ADR-0025): gitleaks over the FULL reachable history
    # on every PR — strictly stronger than the diff scan MM-DES-003 §4
    # sketched, and cheap (the whole history scans in under a second).
    # Findings policy D5: rotate via docs/runbooks/secrets-rotation-*.md,
    # record in the ADR, never rewrite public history.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          curl -sSfL -o /tmp/gitleaks.tgz https://github.com/gitleaks/gitleaks/releases/download/v8.27.2/gitleaks_8.27.2_linux_x64.tar.gz
          echo "141c3b2dede46d8b3a53b47116da756bd223decc0374797559a6b50ecba5590c  /tmp/gitleaks.tgz" | sha256sum -c
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks

      - name: Secrets scan (full history)
        run: /tmp/gitleaks git --no-banner --redact .

  docker:
    # The Docker image is the deployment artifact; building it in CI keeps
    # the Dockerfile from rotting (MM-QA-001 F-09b).
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Build API image
        run: docker build -f apps/api/Dockerfile .

  e2e:
    # Phase 8 gate: the Playwright suite drives the production web build
    # against the dev-embedded API harness (real composition root, seeded
    # DB + E2E fixtures). Runs as its own job so unit CI stays fast.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @mesomed/web exec playwright install --with-deps chromium

      - name: E2E suite
        run: pnpm --filter @mesomed/web e2e
