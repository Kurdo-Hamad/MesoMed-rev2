# Metro's resolver assumes npm/yarn-style flat node_modules (vendored deps
# like expo-router's react-helmet-async reference transitive packages —
# react-fast-compare, invariant, whatwg-fetch — without declaring them).
# pnpm 11 moved this setting here from .npmrc's node-linker key, which is
# now silently ignored; verified empirically in Phase 9a Slice 0 (ADR-0018)
# that isolated linking (pnpm's default) breaks `expo export` for both web
# and native bundles on this exact failure mode, and hoisted fixes it with
# no regression to the rest of the workspace gate.
nodeLinker: hoisted
packages:
  - "apps/*"
  - "packages/*"
  - "tooling/*"
allowBuilds:
  # Postgres 16 binaries for the no-Docker local test-DB fallback
  # (packages/db test harness); postinstall marks them executable.
  "@embedded-postgres/linux-x64": true
  # Dev-only file watcher; prebuilt platform bindings ship as optional deps.
  '@parcel/watcher': false
  # Next.js compiler; prebuilt platform bindings ship as optional deps.
  '@swc/core': false
  # Optional native accelerators of testcontainers' ssh2 dependency; the
  # pure-JS fallback is fine for a test harness.
  cpu-features: false
  esbuild: true
  protobufjs: true
  sharp: true
  ssh2: false
  unrs-resolver: true
