# Metro's resolver assumes npm/yarn-style flat node_modules (vendored deps
# like expo-router's react-helmet-async reference transitive packages —
# react-fast-compare, invariant, whatwg-fetch — without declaring them).
# pnpm 11 moved this setting here from .npmrc's node-linker key, which is
# now silently ignored; verified empirically in Phase 9a Slice 0 (ADR-0018)
# that isolated linking (pnpm's default) breaks `expo export` for both web
# and native bundles on this exact failure mode, and hoisted fixes it with
# no regression to the rest of the workspace gate.
nodeLinker: hoisted
packages:
  - "apps/*"
  - "packages/*"
  - "tooling/*"
allowBuilds:
  # Postgres 16 binaries for the no-Docker local test-DB fallback
  # (packages/db test harness); postinstall marks them executable.
  "@embedded-postgres/linux-x64": true
  # Dev-only file watcher; prebuilt platform bindings ship as optional deps.
  '@parcel/watcher': false
  # Next.js compiler; prebuilt platform bindings ship as optional deps.
  '@swc/core': false
  # Optional native accelerators of testcontainers' ssh2 dependency; the
  # pure-JS fallback is fine for a test harness.
  cpu-features: false
  esbuild: true
  protobufjs: true
  sharp: true
  ssh2: false
  unrs-resolver: true
minimumReleaseAge: 60
overrides:
  # GHSA-v2hh-gcrm-f6hx (high): host confusion via literal backslash
  # authority delimiter. Transitive via fastify>@fastify/ajv-compiler>ajv;
  # ajv@8.20.0 already declares "fast-uri": "^3.0.1", which permits this
  # patch — no fastify/ajv bump needed.
  fast-uri: ^3.1.4
  # GHSA-f88m-g3jw-g9cj (high): inherited libvips CVEs (CVE-2026-33327/28,
  # CVE-2026-35590/91). Transitive optional dep via better-auth>next>sharp;
  # next@16.2.10/16.2.11 (latest 16.x) both still declare "sharp": "^0.34.5",
  # which excludes this patch, so an override is required until next bumps
  # its own range.
  sharp: ^0.35.3
  # GHSA-6g55-p6wh-862q (high): arbitrary file read via attacker-controlled
  # sourceMappingURL in CSS comments, patched in postcss 8.5.12. The only
  # vulnerable resolution is next@16.2.11's exact "postcss": "8.4.31" pin
  # (all other consumers already resolve >=8.5.16), so an override is
  # required until next bumps its pin.
  postcss: ^8.5.12
